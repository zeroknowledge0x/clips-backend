name: Contract Testing

on:
  push:
    branches:
      - StarlinkAndroids
  pull_request:
    branches:
      - main
      - master
      - StarlinkAndroids

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract-style API tests
        run: npm test -- --runInBand test/contract.api-spec.ts
